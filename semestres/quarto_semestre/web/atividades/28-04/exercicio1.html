<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Exercício 1</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        .inline { 
            display: inline; 
            background-color: rgb(16, 255, 230); 
            margin: 5px; 
        }
        .block { 
            display: block; 
            background-color: rgb(102, 255, 0); 
            margin: 5px; 
        }
        .inline-block {
            display: inline-block; 
            background-color: rgb(255, 98, 2); 
            width: 150px; 
            height: 30px; 
            margin: 5px; 
        }

        .area-sobreposta { 
            position: relative; 
            height: 120px; 
        }
        .caixa1 { 
            position: absolute; 
            z-index: 1; 
            background-color: rgb(255, 0, 17); 
            width: 80px; 
            height: 80px; 
            top: 0; 
            left: 0; 
        }
        .caixa2 { 
            position: absolute; 
            z-index: 2; 
            background-color: rgb(255, 247, 1); 
            width: 80px; 
            height: 80px; 
            top: 20px; 
            left: 20px; 
        }

        /* 4. Links */
        a:link { 
            color: rgb(0, 255, 106); 
        }
        a:visited { 
            color: rgb(255, 0, 255); 
        }
        a:hover { 
            color: rgb(255, 0, 0); 
            text-decoration: underline; 
            background-color: transparent; 
        }
        a:active { 
            color: rgb(255, 136, 0); 
        }
    </style>
</head>
<body>
    <div class="inline">Sou inline</div>
    <div class="inline">Sou inline</div>
    <div class="block">Sou block</div>
    <div class="block">Sou block</div>
    <div class="inline-block">Sou inline-block</div>
    <div class="inline-block">Sou inline-block</div>

    <div class="area-sobreposta">
        <div class="caixa1">z-index 1</div>
        <div class="caixa2">z-index 2</div>
    </div>
    <a href="#meuLink">Meu Link (passe o mouse e clique)</a> <br><br>
    <a href="#">Link Visitado</a>
</body>
</html>
