<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Transitions e Transforms</title>
    <style>
        body{
            font-family: "Open Sans", sans-serif;
            padding-top: 60px;
            background-color: lightgrey;
        }
        button{
            background-image: url('https://wallpapercave.com/wp/wp15275145.jpg');
            background-size: cover;
            background-position: center;
            cursor: pointer;
            width: 30%;
            height: 11%;
            border: none;
            border-radius: 10px;
            box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, 0);    
            transition: all 0.5s ease-in-out;

        }
        p {
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        h2{
            transition: all 0.5s ease-in-out;
        }
        .card{
            background-color: white;
            width: 400px;
            height: 500px;
            border-radius: 10px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 30px;
            box-sizing: border-box;
            box-shadow: 0px 1px 1px grey;
            transition: all 0.5s ease-in-out;
            overflow: hidden;

        }
        .card img{
            width: 100%;
            border-radius: 10px 10px 0px 0px;
            transition: all 0.5s ease-in-out; 
        }
        .card img:hover{
            transform: scale(1.1); 
            transition: all 0.5s ease-in-out; 
        }

        button:hover{
            box-shadow: inset 0 0 0 1000px rgba(4, 0, 255, 0.5);
            transform: scale(1.2);
        }
        .card:hover img{
            transform: scale(1.1) rotateY(15deg) ;
            /* transition: all 0.5s ease-in-out;  */
        }
        .card:hover h2{
            color: rgb(42, 170, 42);
        }
        .card:hover{
            transform: translateY(-20px);
            /* transition: all 0.5s ease-in-out; */
            box-shadow: 0px 10px 20px grey;
        }


    </style>
</head>
<body>
    <div class="card">
        <img src="https://wallpapercave.com/wp/wp15275105.png" alt="">
        <h2>Prática de CSS</h2>
        <p>Passe o mouse no cartão para ver a imagem dar um zoom e o cartão flutuar, usando apenas transform e transition</p>
        <button></button>
    </div>
</body>
</html>
